services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: govrag
      POSTGRES_DB: govrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:govrag@postgres:5432/govrag
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:8b
    depends_on:
      - postgres

volumes:
  pgdata:
